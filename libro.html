  <!-- ═══ BOOK SECTION ═══ -->

      <div class="book-spine-bar"></div>
      <div class="flip-stage" id="flipStage">

      </div>
    </div>

    <div class="book-nav">

      <div class="page-dots" id="pageDots"></div>
      <button class="nav-btn" id="nextBtn" aria-label="Página siguiente">›</button>
    </div>

  <!-- ═══ ENVELOPE OVERLAY (before the book opens) ═══ -->
  <div class="envelope-overlay" id="envelopeOverlay" aria-hidden="true">
    <div class="envelope-scene">
      <div class="envelope" id="envelope">
        <div class="env-shadow"></div>
        <div class="env-body">
          <div class="env-inner-fold"></div>
        </div>
        <div class="env-flap" id="envFlap"></div>
        <button class="env-seal" id="envSeal" aria-label="Abrir el sello">
          <span class="seal-ring"></span>
          <span class="seal-char">G</span>
          <span class="seal-crack seal-crack-1"></span>
          <span class="seal-crack seal-crack-2"></span>
          <span class="seal-crack seal-crack-3"></span>
        </button>
      </div>
      <p class="env-hint" id="envHint">Tocá el sello para abrir</p>
    </div>
  </div>

  <!-- ═══ GOODBYE OVERLAY (when leaving) ═══ -->
  <div class="goodbye-overlay" id="goodbyeOverlay" aria-hidden="true">
    <div class="goodbye-card">
      <div class="goodbye-heart">💕</div>
      <p class="goodbye-text">Gracias por leerme</p>
      <p class="goodbye-sub">— Siempre, Gon.</p>
    </div>
